name: Linting

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install isort flake8 black

    - name: Run isort
      run: isort --check-only ./src/irt

    - name: Run flake8
      run: flake8 ./src/irt

    - name: Run black
      run: black --line-length=120 --check --diff ./src/irt
